<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wildcat Lender Claim Intake</title>
    <style>
      :root {
        --bg: #0e0f13; --panel: #171a21; --panel-2: #1f2330; --border: #2a2f3d;
        --text: #e7e9ee; --muted: #9aa3b2; --accent: #f0b429; --accent-2: #ffd166;
        --ok: #3fbf7f; --err: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text);
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 64px; }
      header h1 { font-size: 22px; margin: 0 0 4px; }
      header p { color: var(--muted); margin: 0 0 20px; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
      .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 0 0 14px; }
      .meta { display: grid; grid-template-columns: auto 1fr; gap: 6px 14px; font-size: 13px; }
      .meta dt { color: var(--muted); } .meta dd { margin: 0; word-break: break-all; }
      button { background: var(--accent); color: #1a1205; border: 0; border-radius: 8px; padding: 11px 18px; font-weight: 600; font-size: 14px; cursor: pointer; }
      button:hover { background: var(--accent-2); } button:disabled { opacity: 0.5; cursor: not-allowed; }
      label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
      input[type="text"], input[type="email"], select { width: 100%; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; font-size: 14px; }
      .inline { display: flex; gap: 10px; align-items: flex-end; }
      .inline > div { flex: 1; }
      .check { display: flex; align-items: flex-start; gap: 9px; margin: 12px 0; }
      .check input { margin-top: 3px; } .check span { font-size: 13px; }
      .total { margin-top: 4px; font-size: 16px; } .total b { color: var(--accent-2); }
      .pill { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); margin-left: 6px; }
      .pill.def { color: var(--err); border-color: rgba(255,107,107,0.5); }
      .pill.ok { color: var(--ok); border-color: rgba(63,191,127,0.5); }
      .hint { color: var(--muted); font-size: 12px; margin-top: 8px; }
      .status { padding: 12px 14px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
      .status.ok { background: rgba(63,191,127,0.12); color: var(--ok); border: 1px solid rgba(63,191,127,0.4); }
      .status.err { background: rgba(255,107,107,0.1); color: var(--err); border: 1px solid rgba(255,107,107,0.4); }
      .hidden { display: none; }
      code { background: var(--panel-2); padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Wildcat Lender Claim Intake</h1>
        <p>Find an affected market by its borrower, then connect the wallet you lent with to register a claim.</p>
      </header>

      <div class="card">
        <h2>Context</h2>
        <dl class="meta" id="contextMeta"><dd>Loading…</dd></dl>
      </div>

      <div class="card">
        <h2>1 · Borrower &amp; market</h2>
        <div class="inline">
          <div>
            <label>Borrower address</label>
            <input type="text" id="borrower" placeholder="0x…" spellcheck="false" />
          </div>
          <button id="findBtn">Find markets</button>
        </div>
        <div id="marketWrap" class="hidden">
          <label>Market</label>
          <select id="market"></select>
          <div class="hint" id="marketHint"></div>
        </div>
        <div id="findStatus"></div>
      </div>

      <div class="card hidden" id="walletCard">
        <h2>2 · Wallet</h2>
        <button id="connectBtn">Connect wallet</button>
        <div id="walletInfo" class="hint hidden"></div>
        <div id="connectStatus"></div>
      </div>

      <div class="card hidden" id="eligCard">
        <h2>3 · Eligibility</h2>
        <div id="eligBody"></div>
      </div>

      <div class="card hidden" id="formCard">
        <h2>4 · Your details</h2>
        <label>Full name *</label>
        <input type="text" id="name" autocomplete="name" />
        <label>Email</label>
        <input type="email" id="email" autocomplete="email" />
        <label>Other contact (Telegram, Signal, …)</label>
        <input type="text" id="other" />
        <div class="hint">Provide an email or another contact method.</div>
        <label>Country *</label>
        <select id="country"></select>

        <label class="check"><input type="checkbox" id="willingToLitigate" /><span>I am willing to participate in litigation to recover funds.</span></label>
        <label class="check"><input type="checkbox" id="willingToSpeakToLEO" /><span>I am willing to speak with law enforcement.</span></label>
        <label class="check"><input type="checkbox" id="acceptTerms" /><span>I confirm the above is accurate and consent to this information being shared with the legal/coordination team. *</span></label>

        <button id="submitBtn">Sign &amp; submit claim</button>
        <div id="submitStatus"></div>
      </div>
    </div>

    <script type="module">
      import { BrowserProvider, getAddress, formatUnits, isAddress } from "https://cdn.jsdelivr.net/npm/ethers@6.13.2/+esm";
      import { Country } from "https://cdn.jsdelivr.net/npm/country-state-city@3.2.1/+esm";

      const $ = (id) => document.getElementById(id);
      const show = (el) => el.classList.remove("hidden");
      const hide = (el) => el.classList.add("hidden");
      const setStatus = (el, msg, kind) => { el.className = msg ? "status " + (kind || "") : ""; el.textContent = msg; };

      let cfg = null, account = null, selectedMarket = null, elig = null;
      let markets = [];

      async function loadConfig() {
        try {
          cfg = await (await fetch("/config")).json();
          $("contextMeta").innerHTML = `
            <dt>Network</dt><dd>${cfg.network} <span class="pill">chainId ${cfg.chainId}</span></dd>
            <dt>Default threshold</dt><dd>delinquent for &gt; grace period + ${cfg.defaultBufferDays} days</dd>`;
          if (cfg.borrower) $("borrower").value = cfg.borrower;
        } catch (e) {
          $("contextMeta").innerHTML = `<dd class="status err">Could not load config: ${e.message}</dd>`;
        }
      }

      // ---- 1 · borrower -> markets --------------------------------------------
      $("findBtn").addEventListener("click", async () => {
        const borrower = $("borrower").value.trim();
        if (!isAddress(borrower)) return setStatus($("findStatus"), "Enter a valid borrower address.", "err");
        setStatus($("findStatus"), "Querying the arch-controller…", "");
        try {
          const res = await fetch("/markets", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ borrower }),
          });
          if (!res.ok) throw new Error(await res.text());
          markets = (await res.json()).markets;
          if (!markets.length) {
            setStatus($("findStatus"), "No markets found for that borrower.", "err");
            hide($("marketWrap")); hide($("walletCard"));
            return;
          }
          $("market").innerHTML = `<option value="">Select a market…</option>` +
            markets.map((m) => `<option value="${m.market}">${m.name} ${m.inDefault ? "— IN DEFAULT" : "— not in default"}</option>`).join("");
          show($("marketWrap"));
          setStatus($("findStatus"), `Found ${markets.length} market(s).`, "ok");
        } catch (e) {
          setStatus($("findStatus"), "Lookup failed: " + e.message, "err");
        }
      });

      $("market").addEventListener("change", () => {
        selectedMarket = $("market").value || null;
        const m = markets.find((x) => x.market === selectedMarket);
        $("marketHint").innerHTML = m
          ? `Borrower ${m.borrower.slice(0, 10)}… · ${m.inDefault
              ? `<span class="pill def">in default</span>`
              : `<span class="pill">not in default — claims will be rejected</span>`}`
          : "";
        // Reset downstream steps when the market changes.
        elig = null; hide($("eligCard")); hide($("formCard"));
        if (selectedMarket) { show($("walletCard")); if (account) checkEligibility(); }
        else hide($("walletCard"));
      });

      // ---- 2 · wallet ----------------------------------------------------------
      $("connectBtn").addEventListener("click", async () => {
        if (!window.ethereum) return setStatus($("connectStatus"), "No Ethereum wallet detected.", "err");
        try {
          const provider = new BrowserProvider(window.ethereum);
          const accts = await provider.send("eth_requestAccounts", []);
          account = getAddress(accts[0]);
          $("walletInfo").textContent = "Connected: " + account;
          show($("walletInfo"));
          setStatus($("connectStatus"), "", "");
          if (selectedMarket) checkEligibility();
        } catch (e) {
          setStatus($("connectStatus"), "Connection failed: " + (e.shortMessage || e.message), "err");
        }
      });

      // ---- 3 · eligibility -----------------------------------------------------
      async function checkEligibility() {
        show($("eligCard"));
        $("eligBody").innerHTML = `<div class="hint">Checking on-chain…</div>`;
        try {
          const res = await fetch("/eligibility", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ account, market: selectedMarket }),
          });
          if (!res.ok) throw new Error(await res.text());
          elig = await res.json();
          renderEligibility();
        } catch (e) {
          $("eligBody").innerHTML = `<div class="status err">Eligibility check failed: ${e.message}</div>`;
          hide($("formCard"));
        }
      }

      function renderEligibility() {
        const owed = Number(formatUnits(elig.amountOwedWei, elig.assetDecimals));
        const defPill = elig.inDefault ? `<span class="pill def">in default</span>` : `<span class="pill">not in default</span>`;
        if (!elig.eligible) {
          const why = !elig.inDefault
            ? "This market is not in default, so claims are not open for it."
            : "This address holds no position in this market.";
          $("eligBody").innerHTML = `<div class="meta">
              <dt>Market</dt><dd>${elig.name} ${defPill}</dd>
              <dt>Your position</dt><dd>${owed.toLocaleString(undefined, { maximumFractionDigits: 6 })} ${elig.assetSymbol}</dd>
            </div><div class="status err">${why}</div>`;
          hide($("formCard"));
          return;
        }
        const wd = Number(elig.withdrawalsOwedWei) > 0 ? ` <span class="pill">incl. withdrawals</span>` : "";
        $("eligBody").innerHTML = `<div class="meta">
            <dt>Market</dt><dd>${elig.name} ${defPill}</dd>
            <dt>Borrower</dt><dd>${elig.borrower}</dd>
          </div>
          <div class="total" style="margin-top:12px">Owed: <b>${owed.toLocaleString(undefined, { maximumFractionDigits: 6 })} ${elig.assetSymbol}</b>${wd}</div>
          <div class="hint">Read at block ${elig.asOfBlock}${elig.withdrawalsError ? " · withdrawal read incomplete" : ""}. Re-verified on submit.</div>`;
        show($("formCard"));
      }

      // ---- 4 · submit ----------------------------------------------------------
      function initCountries() {
        $("country").innerHTML = `<option value="">Select…</option>` +
          Country.getAllCountries().map((c) => `<option value="${c.isoCode}">${c.name}</option>`).join("");
      }

      $("submitBtn").addEventListener("click", async () => {
        const form = {
          name: $("name").value.trim(),
          email: $("email").value.trim(),
          other: $("other").value.trim(),
          country: $("country").value,
          acceptTerms: $("acceptTerms").checked,
          willingToSpeakToLEO: $("willingToSpeakToLEO").checked,
          willingToLitigate: $("willingToLitigate").checked,
        };
        if (!form.name) return setStatus($("submitStatus"), "Please enter your name.", "err");
        if (!form.email && !form.other) return setStatus($("submitStatus"), "Provide an email or other contact.", "err");
        if (!form.country) return setStatus($("submitStatus"), "Please select a country.", "err");
        if (!form.acceptTerms) return setStatus($("submitStatus"), "You must confirm the consent checkbox.", "err");
        if (!form.willingToLitigate && !form.willingToSpeakToLEO) return setStatus($("submitStatus"), "Select at least one consent option.", "err");

        const btn = $("submitBtn");
        btn.disabled = true;
        try {
          setStatus($("submitStatus"), "Requesting signature…", "");
          const provider = new BrowserProvider(window.ethereum);
          const signer = await provider.getSigner();
          const types = {
            Contact: [ { name: "name", type: "string" }, { name: "email", type: "string" }, { name: "other", type: "string" } ],
            Location: [ { name: "country", type: "string" } ],
            Options: [ { name: "acceptTerms", type: "bool" }, { name: "willingToSpeakToLEO", type: "bool" }, { name: "willingToLitigate", type: "bool" } ],
            Claim: [ { name: "network", type: "string" }, { name: "market", type: "address" } ],
            Data: [ { name: "contactInfo", type: "Contact" }, { name: "location", type: "Location" }, { name: "options", type: "Options" }, { name: "claim", type: "Claim" } ],
          };
          const value = {
            contactInfo: { name: form.name, email: form.email || "", other: form.other || "" },
            location: { country: form.country },
            options: { acceptTerms: form.acceptTerms, willingToSpeakToLEO: form.willingToSpeakToLEO, willingToLitigate: form.willingToLitigate },
            claim: elig.claim,
          };
          const signature = await signer.signTypedData(cfg.domain, types, value);

          setStatus($("submitStatus"), "Submitting…", "");
          const res = await fetch("/submit", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: { form, claim: elig.claim }, signature }),
          });
          if (!res.ok) throw new Error(await res.text());
          await res.json();
          setStatus($("submitStatus"), "Claim registered. Thank you — the coordination team will be in touch.", "ok");
          btn.textContent = "Submitted";
        } catch (e) {
          setStatus($("submitStatus"), "Submission failed: " + (e.shortMessage || e.message), "err");
          btn.disabled = false;
        }
      });

      loadConfig();
      initCountries();
    </script>
  </body>
</html>
